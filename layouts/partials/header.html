<header class="site-header">
  <div class="wrap header-inner">
    <a class="brand" href="{{ "/" | relURL }}" aria-label="Home">
      <span class="brand-mark" aria-hidden="true">MS</span>
      <span class="brand-name">Michał Szynkiewicz</span>
    </a>
    <nav class="site-nav" aria-label="Primary">
      {{ range site.Menus.main }}
        <a href="{{ .PageRef | relURL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
