name: Deploy site to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Least-privilege token for Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Pin Hugo so CI matches local. Bump deliberately.
      HUGO_VERSION: 0.163.3
    steps:
      - name: Install Hugo (extended), pinned + checksum-verified
        run: |
          DEB="hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          curl -fsSL -o "${RUNNER_TEMP}/${DEB}" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/${DEB}"
          sudo dpkg -i "${RUNNER_TEMP}/${DEB}"
          hugo version
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for .Lastmod / .GitInfo if enabled later
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build
        env:
          HUGO_ENVIRONMENT: production
          TZ: Europe/Warsaw
        run: hugo --gc --minify
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
